# CI Profile — GitHub Actions + Node / TypeScript
# Placeholders: {{NODE_VERSION}}, {{TEST_RUNNER}} (jest | vitest | npm)
# Usage: read this file, replace placeholders, write to .github/workflows/ci.yml

name: CI
on:
  pull_request:
    branches: ["*"]
  push:
    branches: ["dev", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "{{NODE_VERSION}}"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage
        # For Vitest: npx vitest run --coverage
        # For explicit Jest: npx jest --coverage
